<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  .game-wrapper {
    background: #16213e;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,100,200,0.1);
  }
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: #0f3460;
    border-radius: 10px;
    margin-bottom: 15px;
    color: #e0e0e0;
    font-size: 16px;
    font-weight: bold;
  }
  .game-header .title {
    color: #e94560;
    font-size: 20px;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(233,69,96,0.5);
  }
  .game-header .stats span {
    margin: 0 12px;
  }
  .game-header .stats .val { color: #f5c518; }
  canvas {
    display: block;
    border: 3px solid #0f3460;
    border-radius: 8px;
    background: #000;
    image-rendering: pixelated;
  }
  .game-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding: 8px 15px;
    background: #0f3460;
    border-radius: 10px;
    color: #aaa;
    font-size: 13px;
  }
  .game-footer .controls kbd {
    background: #1a1a2e;
    padding: 2px 8px;
    border-radius: 4px;
    color: #f5c518;
    border: 1px solid #333;
    margin: 0 2px;
    font-size: 12px;
  }
  .game-footer button {
    background: #e94560;
    border: none;
    color: white;
    padding: 6px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  .game-footer button:hover { background: #ff6b81; transform: scale(1.05); }
  @media (max-width: 700px) {
    .game-wrapper { padding: 10px; }
    .game-header .title { font-size: 16px; letter-spacing: 2px; }
    .game-header .stats span { margin: 0 6px; font-size: 13px; }
    .game-footer { flex-wrap: wrap; gap: 8px; justify-content: center; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-header">
    <div class="title">⚔ 坦克大战</div>
    <div class="stats">
      <span>🎯 分数 <span class="val" id="scoreDisplay">0</span></span>
      <span>❤️ 生命 <span class="val" id="livesDisplay">3</span></span>
      <span>👾 敌人 <span class="val" id="enemiesDisplay">20</span></span>
      <span>🏆 关卡 <span class="val" id="levelDisplay">1</span></span>
    </div>
  </div>
  <canvas id="gameCanvas" width="624" height="624"></canvas>
  <div class="game-footer">
    <div class="controls">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或 <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> 移动 &nbsp;|&nbsp; <kbd>空格</kbd> 开火 &nbsp;|&nbsp; <kbd>P</kbd> 暂停
    </div>
    <button id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<script>
// ======================== 游戏配置 ========================
const CONFIG = {
  TILE_SIZE: 24,          // 每个格子的大小(像素)
  MAP_COLS: 26,           // 地图列数
  MAP_ROWS: 26,           // 地图行数
  TANK_SIZE: 22,          // 坦克大小(略小于格子)
  BULLET_SIZE: 4,         // 子弹大小
  BULLET_SPEED: 4,        // 子弹速度
  PLAYER_SPEED: 2,        // 玩家速度
  ENEMY_SPEED: 1,         // 敌人速度
  ENEMY_SHOOT_INTERVAL: 60,// 敌人射击间隔(帧数)
  MAX_ENEMIES_ON_MAP: 4,  // 地图上最大敌人数
  TOTAL_ENEMIES: 20,      // 本关总敌人数
  PLAYER_LIVES: 3,        // 玩家生命数
  SPAWN_INVINCIBLE_FRAMES: 90, // 出生无敌帧数
};

const TILE = {
  EMPTY: 0,
  BRICK: 1,
  STEEL: 2,
  BASE: 3,
};

const DIR = {
  UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3,
};

const DIR_VEC = [
  { x: 0, y: -1 }, // UP
  { x: 1, y: 0 },  // RIGHT
  { x: 0, y: 1 },  // DOWN
  { x: -1, y: 0 }, // LEFT
];

// ======================== Canvas ========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ======================== DOM ========================
const scoreDisplay = document.getElementById('scoreDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const enemiesDisplay = document.getElementById('enemiesDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const restartBtn = document.getElementById('restartBtn');

// ======================== 地图数据 ========================
let mapData = [];

function createDefaultMap() {
  const cols = CONFIG.MAP_COLS, rows = CONFIG.MAP_ROWS;
  const m = Array.from({length: rows}, () => Array(cols).fill(TILE.EMPTY));

  // 外围围墙 - 砖块
  for (let x = 0; x < cols; x++) {
    // 顶部和底部
    if (x >= 2 && x <= 23) { m[2][x] = TILE.BRICK; m[23][x] = TILE.BRICK; }
  }
  for (let y = 0; y < rows; y++) {
    if (y >= 2 && y <= 23) { m[y][2] = TILE.BRICK; m[y][23] = TILE.BRICK; }
  }

  // 内部砖块布局 (对称风格)
  function addBrickRect(m, x1, x2, y1, y2) {
    for (let y = y1; y <= y2; y++)
      for (let x = x1; x <= x2; x++)
        if (y >= 0 && y < rows && x >= 0 && x < cols) m[y][x] = TILE.BRICK;
  }

  // 防区布局
  addBrickRect(m, 11, 14, 23, 23);  // 底部防线
  // 对称砖块群
  addBrickRect(m, 5, 7, 6, 8);
  addBrickRect(m, 18, 20, 6, 8);
  addBrickRect(m, 6, 7, 12, 14);
  addBrickRect(m, 18, 19, 12, 14);
  addBrickRect(m, 4, 4, 16, 18);
  addBrickRect(m, 21, 21, 16, 18);
  addBrickRect(m, 9, 11, 5, 5);
  addBrickRect(m, 14, 16, 5, 5);
  addBrickRect(m, 9, 11, 18, 18);
  addBrickRect(m, 14, 16, 18, 18);
  addBrickRect(m, 5, 7, 19, 20);
  addBrickRect(m, 18, 20, 19, 20);
  addBrickRect(m, 9, 10, 10, 11);
  addBrickRect(m, 15, 16, 10, 11);
  addBrickRect(m, 9, 10, 14, 15);
  addBrickRect(m, 15, 16, 14, 15);
  // 中部对称
  addBrickRect(m, 5, 6, 9, 9);
  addBrickRect(m, 19, 20, 9, 9);
  addBrickRect(m, 5, 6, 15, 15);
  addBrickRect(m, 19, 20, 15, 15);

  // 钢墙
  m[10][4] = TILE.STEEL; m[10][5] = TILE.STEEL;
  m[15][4] = TILE.STEEL; m[15][5] = TILE.STEEL;
  m[10][20] = TILE.STEEL; m[10][21] = TILE.STEEL;
  m[15][20] = TILE.STEEL; m[15][21] = TILE.STEEL;
  m[4][12] = TILE.STEEL; m[4][13] = TILE.STEEL;
  m[20][12] = TILE.STEEL; m[20][13] = TILE.STEEL;

  // 基地 (在大本营位置)
  m[24][12] = TILE.BASE;
  m[24][13] = TILE.BASE;
  m[25][12] = TILE.BASE;
  m[25][13] = TILE.BASE;

  return m;
}

// ======================== 游戏对象 ========================
let game = null;

class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.size = CONFIG.TANK_SIZE;
    this.speed = isPlayer ? CONFIG.PLAYER_SPEED : CONFIG.ENEMY_SPEED;
    this.alive = true;
    this.cooldown = 0;
    this.invincible = isPlayer ? 0 : CONFIG.SPAWN_INVINCIBLE_FRAMES;
    this.moveTimer = 0;
    this.shootTimer = 0;
    this.color = isPlayer ? '#f5c518' : '#e94560';
    this.darkColor = isPlayer ? '#c9a000' : '#c03050';
    this.lightColor = isPlayer ? '#ffe066' : '#ff6b81';
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  getTilePos() {
    const ts = CONFIG.TILE_SIZE;
    return {
      col: Math.floor((this.x + this.size / 2) / ts),
      row: Math.floor((this.y + this.size / 2) / ts),
    };
  }

  draw(ctx) {
    if (!this.alive) return;
    const s = this.size;
    const cx = this.x + s / 2;
    const cy = this.y + s / 2;

    ctx.save();

    // 无敌闪烁
    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) {
      ctx.globalAlpha = 0.6;
    }

    // 坦克主体 - 圆形底座
    ctx.translate(cx, cy);
    ctx.rotate(this.dir * Math.PI / 2);

    // 履带
    ctx.fillStyle = '#555';
    ctx.fillRect(-s/2, -s/2, s, s * 0.22);
    ctx.fillRect(-s/2, s/2 - s * 0.22, s, s * 0.22);

    // 履带纹理
    ctx.fillStyle = '#444';
    for (let i = 0; i < 5; i++) {
      const tx = -s/2 + 2 + i * (s / 5);
      ctx.fillRect(tx, -s/2 + 1, 2, s * 0.22 - 2);
      ctx.fillRect(tx, s/2 - s * 0.22 + 1, 2, s * 0.22 - 2);
    }

    // 车身
    ctx.fillStyle = this.color;
    ctx.fillRect(-s/2 + 2, -s/2 + s * 0.22 + 1, s - 4, s - s * 0.44 - 2);

    // 车身边框
    ctx.strokeStyle = this.darkColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(-s/2 + 2, -s/2 + s * 0.22 + 1, s - 4, s - s * 0.44 - 2);

    // 炮塔 (圆形)
    ctx.fillStyle = this.darkColor;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = this.lightColor;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = '#888';
    ctx.fillRect(-2, -s/2 + 1, 4, s * 0.35);

    // 炮口
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-2, -s/2, 4, 3);

    // 玩家标记
    if (this.isPlayer) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', 0, 0);
    }

    ctx.restore();

    // 无敌光环
    if (this.invincible > 0) {
      ctx.strokeStyle = `rgba(255,255,255,${0.3 + 0.3 * Math.sin(Date.now() / 100)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  getRect() {
    const margin = 1;
    return {
      x: this.x + margin,
      y: this.y + margin,
      w: this.size - margin * 2,
      h: this.size - margin * 2,
    };
  }
}

class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.size = CONFIG.BULLET_SIZE;
    this.speed = CONFIG.BULLET_SPEED;
    this.alive = true;
  }

  update() {
    const v = DIR_VEC[this.dir];
    this.x += v.x * this.speed;
    this.y += v.y * this.speed;
    const ts = CONFIG.TILE_SIZE;
    const cols = CONFIG.MAP_COLS, rows = CONFIG.MAP_ROWS;
    if (this.x < 0 || this.x > cols * ts || this.y < 0 || this.y > rows * ts) {
      this.alive = false;
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    const s = this.size;
    const cx = this.x + s / 2;
    const cy = this.y + s / 2;

    // 子弹发光效果
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 2);
    const color = this.isPlayer ? '#ff0' : '#f44';
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, color);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, s * 2, 0, Math.PI * 2);
    ctx.fill();

    // 子弹核心
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x, this.y, s, s);
  }

  getRect() {
    return { x: this.x, y: this.y, w: this.size, h: this.size };
  }
}

// ======================== 游戏主类 ========================
class Game {
  constructor() {
    this.level = 1;
    this.score = 0;
    this.lives = CONFIG.PLAYER_LIVES;
    this.totalEnemies = CONFIG.TOTAL_ENEMIES;
    this.enemiesSpawned = 0;
    this.enemiesKilled = 0;
    this.paused = false;
    this.gameOver = false;
    this.victory = false;
    this.frame = 0;
    this.keys = {};
    this.lastKeyDir = null;

    this.initLevel();
    this.setupInput();
  }

  initLevel() {
    mapData = createDefaultMap();
    this.bullets = [];
    this.enemies = [];
    this.explosions = [];
    this.spawnQueue = this.totalEnemies;
    this.enemiesSpawned = 0;
    this.enemiesKilled = 0;
    this.baseAlive = true;
    this.playerSpawned = false;
    this.spawnTimer = 0;

    // 生成玩家
    const ts = CONFIG.TILE_SIZE;
    this.player = new Tank(ts * 12, ts * 24, DIR.UP, true);
    this.player.invincible = CONFIG.SPAWN_INVINCIBLE_FRAMES;
    this.playerSpawned = true;
  }

  setupInput() {
    const handleKey = (e, pressed) => {
      const key = e.key;
      if (key === 'p' || key === 'P') {
        if (pressed) this.paused = !this.paused;
        return;
      }
      if (pressed) {
        this.keys[key] = true;
        // 跟踪最近的方向键
        const dirKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
        if (dirKeys.includes(key)) this.lastKeyDir = key;
      } else {
        this.keys[key] = false;
      }
    };
    window.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ', 'w','W','s','S','a','A','d','D','p','P'].includes(e.key)) {
        e.preventDefault();
      }
      handleKey(e, true);
    });
    window.addEventListener('keyup', e => handleKey(e, false));

    restartBtn.addEventListener('click', () => this.restart());
  }

  restart() {
    this.score = 0;
    this.lives = CONFIG.PLAYER_LIVES;
    this.level = 1;
    this.totalEnemies = CONFIG.TOTAL_ENEMIES;
    this.gameOver = false;
    this.victory = false;
    this.initLevel();
    this.updateUI();
  }

  nextLevel() {
    this.level++;
    this.totalEnemies = Math.min(20 + this.level * 5, 50);
    this.initLevel();
    this.updateUI();
  }

  // ======================== 碰撞检测 ========================
  rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  canMoveTo(tank, nx, ny) {
    const ts = CONFIG.TILE_SIZE;
    const cols = CONFIG.MAP_COLS, rows = CONFIG.MAP_ROWS;
    const margin = 1;
    const rect = { x: nx + margin, y: ny + margin, w: tank.size - margin * 2, h: tank.size - margin * 2 };

    // 边界检查
    if (nx < 0 || nx + tank.size > cols * ts || ny < 0 || ny + tank.size > rows * ts) return false;

    // 地图碰撞 - 检查坦克覆盖的格子
    const startCol = Math.floor(nx / ts);
    const endCol = Math.floor((nx + tank.size - 1) / ts);
    const startRow = Math.floor(ny / ts);
    const endRow = Math.floor((ny + tank.size - 1) / ts);

    for (let r = startRow; r <= endRow; r++) {
      for (let c = startCol; c <= endCol; c++) {
        if (r < 0 || r >= rows || c < 0 || c >= cols) return false;
        const tile = mapData[r][c];
        if (tile !== TILE.EMPTY) {
          // 检查坦克矩形与tile矩形
          const tileRect = { x: c * ts, y: r * ts, w: ts, h: ts };
          if (this.rectsOverlap(rect, tileRect)) return false;
        }
      }
    }

    // 与其他坦克碰撞
    const allTanks = [this.player, ...this.enemies].filter(t => t && t.alive && t !== tank);
    for (const t of allTanks) {
      const tr = { x: t.x + margin, y: t.y + margin, w: t.size - margin * 2, h: t.size - margin * 2 };
      if (this.rectsOverlap(rect, tr)) return false;
    }

    return true;
  }

  fireBullet(tank) {
    if (tank.cooldown > 0) return;
    const s = tank.size;
    const bs = CONFIG.BULLET_SIZE;
    const cx = tank.cx - bs / 2;
    const cy = tank.cy - bs / 2;
    let bx = cx, by = cy;

    switch (tank.dir) {
      case DIR.UP:    bx = cx; by = tank.y - bs; break;
      case DIR.DOWN:  bx = cx; by = tank.y + s; break;
      case DIR.LEFT:  bx = tank.x - bs; by = cy; break;
      case DIR.RIGHT: bx = tank.x + s; by = cy; break;
    }

    this.bullets.push(new Bullet(bx, by, tank.dir, tank.isPlayer));
    tank.cooldown = tank.isPlayer ? 15 : 30;
  }

  // ======================== 爆炸效果 ========================
  addExplosion(x, y, large = false) {
    const size = large ? 40 : 24;
    this.explosions.push({ x: x - size/2, y: y - size/2, size: size, frame: 0, maxFrame: 15 });
  }

  // ======================== 生成敌人 ========================
  spawnEnemy() {
    const ts = CONFIG.TILE_SIZE;
    const spawnPoints = [
      { x: ts * 1, y: ts * 1 },
      { x: ts * 12, y: ts * 1 },
      { x: ts * 23, y: ts * 1 },
    ];

    // 找一个空的生成点
    for (const sp of spawnPoints) {
      const overlap = [this.player, ...this.enemies].some(t =>
        t && t.alive && Math.abs(t.x - sp.x) < ts && Math.abs(t.y - sp.y) < ts
      );
      if (!overlap) {
        const enemy = new Tank(sp.x, sp.y, DIR.DOWN, false);
        enemy.color = '#e94560';
        enemy.darkColor = '#c03050';
        enemy.lightColor = '#ff6b81';
        // 随机速度变化
        if (Math.random() < 0.3) enemy.speed = 1.3;
        this.enemies.push(enemy);
        this.enemiesSpawned++;
        this.addExplosion(sp.x + ts/2, sp.y + ts/2, true);
        return true;
      }
    }
    return false;
  }

  // ======================== 敌人AI ========================
  updateEnemyAI(enemy) {
    if (!enemy.alive) return;

    // 移动
    enemy.moveTimer--;
    if (enemy.moveTimer <= 0) {
      // 随机更换方向
      const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
      // 有一定概率朝玩家方向
      if (this.player && this.player.alive && Math.random() < 0.4) {
        const dx = this.player.cx - enemy.cx;
        const dy = this.player.cy - enemy.cy;
        if (Math.abs(dx) > Math.abs(dy)) {
          enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else {
        enemy.dir = dirs[Math.floor(Math.random() * 4)];
      }
      enemy.moveTimer = 30 + Math.floor(Math.random() * 40);
    }

    const v = DIR_VEC[enemy.dir];
    const nx = enemy.x + v.x * enemy.speed;
    const ny = enemy.y + v.y * enemy.speed;
    if (this.canMoveTo(enemy, nx, ny)) {
      enemy.x = nx;
      enemy.y = ny;
    } else {
      enemy.dir = Math.floor(Math.random() * 4);
      enemy.moveTimer = 10;
    }

    // 射击
    enemy.shootTimer--;
    if (enemy.shootTimer <= 0) {
      this.fireBullet(enemy);
      enemy.shootTimer = CONFIG.ENEMY_SHOOT_INTERVAL + Math.floor(Math.random() * 30);
    }

    // 更新无敌状态
    if (enemy.invincible > 0) enemy.invincible--;
    if (enemy.cooldown > 0) enemy.cooldown--;
  }

  // ======================== 更新逻辑 ========================
  update() {
    if (this.paused || this.gameOver || this.victory) return;
    this.frame++;

    // --- 生成敌人 ---
    this.spawnTimer--;
    if (this.spawnTimer <= 0 && this.enemiesSpawned < this.totalEnemies &&
        this.enemies.length < CONFIG.MAX_ENEMIES_ON_MAP) {
      this.spawnEnemy();
      this.spawnTimer = 120;
    }

    // --- 玩家控制 ---
    if (this.player && this.player.alive) {
      let moved = false;
      const dirKeys = [
        { key: 'ArrowUp', dir: DIR.UP }, { key: 'ArrowDown', dir: DIR.DOWN },
        { key: 'ArrowLeft', dir: DIR.LEFT }, { key: 'ArrowRight', dir: DIR.RIGHT },
        { key: 'w', dir: DIR.UP }, { key: 'W', dir: DIR.UP },
        { key: 's', dir: DIR.DOWN }, { key: 'S', dir: DIR.DOWN },
        { key: 'a', dir: DIR.LEFT }, { key: 'A', dir: DIR.LEFT },
        { key: 'd', dir: DIR.RIGHT }, { key: 'D', dir: DIR.RIGHT },
      ];

      for (const kd of dirKeys) {
        if (this.keys[kd.key]) {
          this.player.dir = kd.dir;
          const v = DIR_VEC[kd.dir];
          const nx = this.player.x + v.x * this.player.speed;
          const ny = this.player.y + v.y * this.player.speed;
          if (this.canMoveTo(this.player, nx, ny)) {
            this.player.x = nx;
            this.player.y = ny;
            moved = true;
          }
          break;
        }
      }

      // 射击
      if (this.keys[' '] || this.keys['Space']) {
        this.fireBullet(this.player);
      }

      if (this.player.invincible > 0) this.player.invincible--;
      if (this.player.cooldown > 0) this.player.cooldown--;
    }

    // --- 更新敌人AI ---
    for (const enemy of this.enemies) {
      this.updateEnemyAI(enemy);
    }

    // --- 更新子弹 ---
    for (const b of this.bullets) {
      b.update();
    }

    // --- 子弹碰撞检测 ---
    this.handleBulletCollisions();

    // --- 清理 ---
    this.bullets = this.bullets.filter(b => b.alive);
    this.enemies = this.enemies.filter(e => e.alive);

    // --- 爆炸动画 ---
    for (const e of this.explosions) {
      e.frame++;
    }
    this.explosions = this.explosions.filter(e => e.frame < e.maxFrame);

    // --- 检查游戏状态 ---
    this.checkGameState();

    // --- 更新UI ---
    this.updateUI();
  }

  handleBulletCollisions() {
    const ts = CONFIG.TILE_SIZE;
    const cols = CONFIG.MAP_COLS;
    const rows = CONFIG.MAP_ROWS;

    for (const b of this.bullets) {
      if (!b.alive) continue;

      // 子弹与地图碰撞
      const col = Math.floor(b.x / ts);
      const row = Math.floor(b.y / ts);
      if (row >= 0 && row < rows && col >= 0 && col < cols) {
        const tile = mapData[row][col];
        if (tile === TILE.BRICK) {
          mapData[row][col] = TILE.EMPTY;
          b.alive = false;
          this.addExplosion(col * ts + ts/2, row * ts + ts/2);
          // 检查基地砖块被破坏
          if (row >= 24 && (col === 12 || col === 13)) {
            this.baseAlive = false;
          }
          continue;
        } else if (tile === TILE.STEEL) {
          b.alive = false;
          this.addExplosion(col * ts + ts/2, row * ts + ts/2);
          continue;
        } else if (tile === TILE.BASE) {
          this.baseAlive = false;
          b.alive = false;
          this.addExplosion(col * ts + ts/2, row * ts + ts/2, true);
          continue;
        }
      }

      // 子弹与坦克碰撞
      if (b.isPlayer) {
        // 玩家子弹 -> 击中敌人
        for (const enemy of this.enemies) {
          if (!enemy.alive) continue;
          if (enemy.invincible > 0) continue;
          const er = { x: enemy.x, y: enemy.y, w: enemy.size, h: enemy.size };
          const br = { x: b.x, y: b.y, w: b.size, h: b.size };
          if (this.rectsOverlap(br, er)) {
            enemy.alive = false;
            b.alive = false;
            this.enemiesKilled++;
            this.score += 100;
            this.addExplosion(enemy.cx, enemy.cy, true);
            break;
          }
        }
      } else {
        // 敌人子弹 -> 击中玩家
        if (this.player && this.player.alive) {
          if (this.player.invincible <= 0) {
            const pr = { x: this.player.x, y: this.player.y, w: this.player.size, h: this.player.size };
            const br = { x: b.x, y: b.y, w: b.size, h: b.size };
            if (this.rectsOverlap(br, pr)) {
              b.alive = false;
              this.player.alive = false;
              this.addExplosion(this.player.cx, this.player.cy, true);
            }
          }
        }
      }

      // 子弹与子弹碰撞
      if (b.alive) {
        for (const b2 of this.bullets) {
          if (b2 === b || !b2.alive || b2.isPlayer === b.isPlayer) continue;
          if (this.rectsOverlap(
            { x: b.x, y: b.y, w: b.size, h: b.size },
            { x: b2.x, y: b2.y, w: b2.size, h: b2.size }
          )) {
            b.alive = false;
            b2.alive = false;
            break;
          }
        }
      }
    }
  }

  checkGameState() {
    // 玩家死亡
    if (this.player && !this.player.alive) {
      this.lives--;
      if (this.lives > 0) {
        // 重生
        const ts = CONFIG.TILE_SIZE;
        setTimeout(() => {
          if (this.gameOver) return;
          this.player = new Tank(ts * 12, ts * 24, DIR.UP, true);
          this.player.invincible = CONFIG.SPAWN_INVINCIBLE_FRAMES;
          this.playerSpawned = true;
          this.addExplosion(this.player.cx, this.player.cy, true);
        }, 1000);
      } else {
        this.gameOver = true;
      }
    }

    // 基地被毁
    if (!this.baseAlive) {
      this.gameOver = true;
    }

    // 胜利
    if (this.enemiesKilled >= this.totalEnemies) {
      this.victory = true;
    }
  }

  // ======================== 绘制 ========================
  draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 网格背景
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 绘制网格线
    const ts = CONFIG.TILE_SIZE;
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= canvas.width; x += ts) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= canvas.height; y += ts) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // 绘制地图
    this.drawMap();

    // 绘制坦克
    if (this.player) this.player.draw(ctx);
    for (const enemy of this.enemies) {
      enemy.draw(ctx);
    }

    // 绘制子弹
    for (const b of this.bullets) {
      b.draw(ctx);
    }

    // 绘制爆炸
    this.drawExplosions();

    // 绘制HUD
    this.drawHUD();
  }

  drawMap() {
    const ts = CONFIG.TILE_SIZE;
    for (let row = 0; row < CONFIG.MAP_ROWS; row++) {
      for (let col = 0; col < CONFIG.MAP_COLS; col++) {
        const tile = mapData[row][col];
        const x = col * ts, y = row * ts;
        switch (tile) {
          case TILE.BRICK:
            // 砖块纹理
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x, y, ts, ts);
            // 砖纹
            ctx.strokeStyle = '#6B3410';
            ctx.lineWidth = 1;
            // 水平缝
            ctx.beginPath(); ctx.moveTo(x, y + ts/2); ctx.lineTo(x + ts, y + ts/2); ctx.stroke();
            // 垂直缝 (交错)
            ctx.beginPath(); ctx.moveTo(x + ts/2, y); ctx.lineTo(x + ts/2, y + ts/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + ts/4, y + ts/2); ctx.lineTo(x + ts/4, y + ts); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + ts*3/4, y + ts/2); ctx.lineTo(x + ts*3/4, y + ts); ctx.stroke();
            break;
          case TILE.STEEL:
            // 钢墙
            ctx.fillStyle = '#888';
            ctx.fillRect(x, y, ts, ts);
            ctx.fillStyle = '#999';
            ctx.fillRect(x + 2, y + 2, ts - 4, ts - 4);
            ctx.fillStyle = '#aaa';
            ctx.fillRect(x + 4, y + 4, ts - 8, ts - 8);
            // 铆钉
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(x + 4, y + 4, 2, 0, Math.PI * 2);
            ctx.arc(x + ts - 4, y + 4, 2, 0, Math.PI * 2);
            ctx.arc(x + 4, y + ts - 4, 2, 0, Math.PI * 2);
            ctx.arc(x + ts - 4, y + ts - 4, 2, 0, Math.PI * 2);
            ctx.fill();
            break;
          case TILE.BASE:
            // 基地 - 旗帜
            if (this.baseAlive) {
              ctx.fillStyle = '#222';
              ctx.fillRect(x, y, ts, ts);
              // 旗杆
              ctx.fillStyle = '#888';
              ctx.fillRect(x + ts/2 - 1, y + 2, 2, ts - 4);
              // 旗帜
              ctx.fillStyle = '#e94560';
              ctx.beginPath();
              ctx.moveTo(x + ts/2 + 1, y + 3);
              ctx.lineTo(x + ts - 3, y + ts/4);
              ctx.lineTo(x + ts/2 + 1, y + ts/2 - 1);
              ctx.fill();
              // 鹰标
              ctx.fillStyle = '#f5c518';
              ctx.font = '10px Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText('🏠', x + ts/2, y + ts*0.75);
            } else {
              ctx.fillStyle = '#400';
              ctx.fillRect(x, y, ts, ts);
              ctx.fillStyle = '#600';
              ctx.font = '14px Arial';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText('💀', x + ts/2, y + ts/2);
            }
            break;
        }
      }
    }
  }

  drawExplosions() {
    for (const e of this.explosions) {
      const progress = e.frame / e.maxFrame;
      const alpha = 1 - progress;
      const r = e.size / 2 * (0.5 + progress * 0.5);
      const cx = e.x + e.size / 2;
      const cy = e.y + e.size / 2;

      // 外圈
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      if (progress < 0.3) {
        grad.addColorStop(0, `rgba(255,255,200,${alpha})`);
        grad.addColorStop(0.5, `rgba(255,200,50,${alpha * 0.8})`);
        grad.addColorStop(1, `rgba(255,100,0,0)`);
      } else {
        grad.addColorStop(0, `rgba(255,200,100,${alpha * 0.5})`);
        grad.addColorStop(0.5, `rgba(200,100,50,${alpha * 0.3})`);
        grad.addColorStop(1, `rgba(100,50,0,0)`);
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // 粒子
      if (progress < 0.6) {
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2 + progress * 2;
          const dist = r * (0.3 + progress * 0.7);
          const px = cx + Math.cos(angle) * dist;
          const py = cy + Math.sin(angle) * dist;
          const ps = 2 + (1 - progress) * 3;
          ctx.fillStyle = `rgba(255,${150 + Math.floor(Math.random() * 100)},50,${alpha})`;
          ctx.fillRect(px - ps/2, py - ps/2, ps, ps);
        }
      }
    }
  }

  drawHUD() {
    // 暂停遮罩
    if (this.paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏸ 暂停', canvas.width / 2, canvas.height / 2);
      ctx.font = '18px Arial';
      ctx.fillStyle = '#aaa';
      ctx.fillText('按 P 键继续', canvas.width / 2, canvas.height / 2 + 60);
    }

    // Game Over
    if (this.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 52px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💀 GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = '#aaa';
      ctx.font = '20px Arial';
      ctx.fillText(`最终得分: ${this.score}`, canvas.width / 2, canvas.height / 2 + 50);
      ctx.fillStyle = '#f5c518';
      ctx.font = '16px Arial';
      ctx.fillText('点击「重新开始」再来一局', canvas.width / 2, canvas.height / 2 + 100);
    }

    // 胜利
    if (this.victory) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f5c518';
      ctx.font = 'bold 52px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎉 胜利！', canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = '22px Arial';
      ctx.fillText(`得分: ${this.score}  |  关卡: ${this.level}`, canvas.width / 2, canvas.height / 2 + 50);
      ctx.fillStyle = '#aaa';
      ctx.font = '16px Arial';
      ctx.fillText('点击「重新开始」进入下一关', canvas.width / 2, canvas.height / 2 + 100);
    }

    // 击杀计数
    if (!this.gameOver && !this.victory) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '11px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`击杀: ${this.enemiesKilled} / ${this.totalEnemies}`, 5, canvas.height - 5);
    }
  }

  updateUI() {
    scoreDisplay.textContent = this.score;
    livesDisplay.textContent = this.lives;
    enemiesDisplay.textContent = Math.max(0, this.totalEnemies - this.enemiesKilled);
    levelDisplay.textContent = this.level;
  }
}

// ======================== 主循环 ========================
function gameLoop() {
  if (game) {
    game.update();
    game.draw();
  }
  requestAnimationFrame(gameLoop);
}

// ======================== 开始游戏 ========================
game = new Game();
gameLoop();

// ======================== 窗口自适应 ========================
function resizeCanvas() {
  const wrapper = document.querySelector('.game-wrapper');
  const maxW = window.innerWidth - 40;
  const maxH = window.innerHeight - 40;
  const naturalW = 664; // canvas + padding
  const naturalH = 780;

  let scale = 1;
  if (maxW < naturalW || maxH < naturalH) {
    scale = Math.min(maxW / naturalW, maxH / naturalH);
  }
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.transformOrigin = 'top center';
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

console.log('🎮 坦克大战已启动！');
console.log('🕹️  WASD/方向键移动，空格开火，P暂停');
</script>
